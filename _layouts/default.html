<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <title>{{ site.title | default: site.github.repository_name }}</title>
  </head>

  <body>

    <header>
      <div class="container">
        <h1>{{ site.title | default: site.github.repository_name }}</h1>
        <h2>{{ site.description | default: site.github.project_tagline }}</h2>
         <a href="linzeyan.github.io/Octocat_qrcode.png" ><img border="0" height="150" src="https://linzeyan.github.io/Octocat_qrcode.png" width="150" /></a>
        <a href="https://github.com/linzeyan/linzeyan.github.io/raw/master/Octocat_qrcode.png" ><img border="0" height="150" src="https://linzeyan.github.io/Octocat_qrcode.png" width="150" /></a>
        <section id="downloads">
          <a href="https://github.com/linzeyan" class="btn btn-github"><span class="icon"></span>LinZeYan @ GitHub</a>
          {% if site.show_downloads %}
           <!--   <a href="https://linzeyan.github.io" class="btn">HOME PAGE</a> -->
           <!-- <a href="{{ site.github.tar_url }}" class="btn">Download .tar.gz</a>  -->
          {% endif %}          
        </section>
      </div>
    </header>

    <div class="container">
      <section id="main_content">
        {{ content }}
      </section>
    </div>

    {% if site.google_analytics %}
      <script type="text/javascript">
        (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
        (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
        m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
        })(window,document,'script','//www.google-analytics.com/analytics.js','ga');
        ga('create', '{{ site.google_analytics }}', 'auto');
        ga('send', 'pageview');
      </script>
    {% endif %}
  </body>
</html>
